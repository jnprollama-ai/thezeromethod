<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Command Center</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-logo">🌀</span>
            <span class="nav-title">Command Center</span>
        </div>
        <ul class="nav-menu">
            <li><a href="/" class="nav-link"><span>🏠</span> Dashboard</a></li>
            <li><a href="/agents" class="nav-link"><span>👾</span> Agents</a></li>
            <li><a href="/projects" class="nav-link active"><span>📊</span> Projects</a></li>
            <li><a href="/blogs" class="nav-link"><span>📝</span> Blogs</a></li>
            <li><a href="/social" class="nav-link"><span>📱</span> Social</a></li>
            <li><a href="/saas" class="nav-link"><span>🚀</span> SaaS</a></li>
            <li><a href="/trading" class="nav-link"><span>💹</span> Trading</a></li>
        </ul>
        <div class="nav-status">
            <span class="status-dot online"></span>
            <span>Online</span>
        </div>
    </nav>

    <main class="main-content">
        <section class="page-header">
            <h1>📊 Projects Dashboard</h1>
            <p class="page-subtitle">Track project progress and milestones</p>
        </section>

        <section class="projects-section">
            <div id="projectsContainer">
                <div class="agent-detail-card">
                    <div class="agent-header">
                        <div class="activity-icon">⏳</div>
                        <div class="activity-content">
                            <div class="activity-text">Loading projects...</div>
                            <div class="activity-meta">Please wait</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 Zero Method | Command Center v2.0</p>
    </footer>

    <script>
        const socket = io();
        
        socket.on('statusUpdate', (data) => {
            const container = document.getElementById('projectsContainer');
            container.innerHTML = Object.entries(data.projects).map(([id, project]) => `
                <div class="agent-detail-card">
                    <div class="agent-header">
                        <div class="agent-avatar-large">
                            ${id === 'zma' ? '💼' : id === 'trading' ? '💹' : id === 'saas' ? '🚀' : '📋'}
                        </div>
                        <div class="agent-info">
                            <h2>${project.name}</h2>
                            <div>
                                <span class="agent-role-badge">${project.status}</span>
                                <span class="agent-status-badge" style="background: rgba(59, 130, 246, 0.2); color: #3b82f6;">
                                    ${project.progress}% Complete
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="agent-body">
                        <div class="agent-stat">
                            <span class="stat-label">Revenue:</span>
                            <span class="stat-value">$${project.revenue || 0}</span>
                        </div>
                        
                        <div class="agent-stat">
                            <span class="stat-label">Tasks:</span>
                            <div class="stat-value" style="width: 100%;">
                                ${project.tasks ? project.tasks.map(task => `
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; padding: 8px; border-radius: 6px; background: ${task.done ? 'rgba(16, 185, 129, 0.1)' : 'rgba(148, 163, 184, 0.1)'}; border: 1px solid ${task.done ? 'rgba(16, 185, 129, 0.3)' : 'rgba(148, 163, 184, 0.3)'};">
                                        <span>${task.name}</span>
                                        <span>
                                            <input type="checkbox" ${task.done ? 'checked' : ''} onchange="updateTask('${id}', '${task.name}', this.checked)" />
                                        </span>
                                    </div>
                                `).join('') : 'No tasks defined'}
                            </div>
                        </div>
                        
                        <div class="agent-stat">
                            <span class="stat-label">Pending Items:</span>
                            <div class="stat-value" style="width: 100%;">
                                ${project.tasks ? project.tasks.filter(t => !t.done).map(task => `
                                    <div style="margin-bottom: 8px; padding: 8px; border-radius: 6px; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3);">
                                        <span>⏳ ${task.name}</span>
                                    </div>
                                `).join('') : 'All tasks completed!'}
                            </div>
                        </div>
                        
                        <div class="agent-actions">
                            <button class="btn btn-secondary" onclick="updateProject('${id}')">
                                <span>✏️</span> Update Progress
                            </button>
                            <button class="btn btn-primary" onclick="viewProject('${id}')">
                                <span>👁️</span> Details
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        });

        function updateTask(projectId, taskName, done) {
            fetch('/api/projects/task/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    projectId: projectId, 
                    taskName: taskName,
                    done: done
                })
            })
            .then(() => {
                // Refresh data
                fetch('/api/status')
                    .then(res => res.json())
                    .then(data => socket.emit('statusUpdate', data));
            });
        }

        function updateProject(projectId) {
            const newProgress = prompt('Enter new progress percentage (0-100):');
            if (newProgress && !isNaN(newProgress) && newProgress >= 0 && newProgress <= 100) {
                fetch('/api/projects/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        projectId: projectId, 
                        updates: { progress: parseInt(newProgress) } 
                    })
                })
                .then(() => {
                    // Refresh data
                    fetch('/api/status')
                        .then(res => res.json())
                        .then(data => socket.emit('statusUpdate', data));
                });
            }
        }

        function viewProject(projectId) {
            alert('Project details view would open here for: ' + projectId);
        }

        // Initial load
        fetch('/api/status')
            .then(res => res.json())
            .then(data => socket.emit('statusUpdate', data))
            .catch(err => {
                console.error('Error loading projects:', err);
                document.getElementById('projectsContainer').innerHTML = `
                    <div class="agent-detail-card">
                        <div class="agent-header">
                            <div class="activity-icon">❌</div>
                            <div class="activity-content">
                                <div class="activity-text">Failed to load projects</div>
                                <div class="activity-meta">Check connection and try again</div>
                            </div>
                        </div>
                    </div>
                `;
            });
    </script>
</body>
</html>
