<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents | Command Center</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-logo">🌀</span>
            <span class="nav-title">Command Center</span>
        </div>
        <ul class="nav-menu">
            <li><a href="/" class="nav-link"><span>🏠</span> Dashboard</a></li>
            <li><a href="/agents" class="nav-link active"><span>👾</span> Agents</a></li>
            <li><a href="/projects" class="nav-link"><span>📊</span> Projects</a></li>
            <li><a href="/blogs" class="nav-link"><span>📝</span> Blogs</a></li>
            <li><a href="/social" class="nav-link"><span>📱</span> Social</a></li>
            <li><a href="/saas" class="nav-link"><span>🚀</span> SaaS</a></li>
            <li><a href="/trading" class="nav-link"><span>💹</span> Trading</a></li>
        </ul>
        <div class="nav-status">
            <span class="status-dot online"></span>
            <span>Online</span>
        </div>
    </nav>

    <main class="main-content">
        <section class="page-header">
            <h1>👾 Agent Fleet</h1>
            <p class="page-subtitle">Monitor and manage Zero Method AI agents</p>
        </section>

        <section class="agents-section">
            <!-- Agent Stats -->
            <div class="stats-grid" id="agentStats">
                <div class="stat-card">
                    <div class="stat-icon">👾</div>
                    <div class="stat-value" id="totalAgents">0</div>
                    <div class="stat-label">Total Agents</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" id="activeAgents">0</div>
                    <div class="stat-label">Active</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">⏸️</div>
                    <div class="stat-value" id="idleAgents">0</div>
                    <div class="stat-label">Idle</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-value" id="busyAgents">0</div>
                    <div class="stat-label">Busy</div>
                </div>
            </div>

            <!-- Agents List -->
            <div id="agentsContainer">
                <!-- Agents will be rendered here -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 Zero Method | Command Center v2.1</p>
    </footer>

    <script>
        const socket = io();
        let currentStatus = null;

        socket.on('statusUpdate', (data) => {
            currentStatus = data;
            updateAgentStats(data);
            renderAgents(data);
        });

        function updateAgentStats(data) {
            const agents = data.agents || [];
            document.getElementById('totalAgents').textContent = agents.length;
            document.getElementById('activeAgents').textContent = agents.filter(a => a.status === 'active').length;
            document.getElementById('idleAgents').textContent = agents.filter(a => a.status === 'idle').length;
            document.getElementById('busyAgents').textContent = agents.filter(a => a.status === 'busy').length;
        }

        function renderAgents(data) {
            const container = document.getElementById('agentsContainer');
            const agents = data.agents || [];
            
            container.innerHTML = agents.map(agent => `
                <div class="agent-detail-card">
                    <div class="agent-header">
                        <div class="agent-avatar-large">
                            ${agent.pokemon}
                        </div>
                        <div class="agent-info">
                            <h2>${agent.name}</h2>
                            <div>
                                <span class="agent-role-badge">${agent.role}</span>
                                <span class="agent-status-badge ${agent.status}">${agent.status}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="agent-body">
                        <div class="agent-stat">
                            <span class="stat-label">Current Task</span>
                            <span class="stat-value">${agent.task || 'No active task'}</span>
                        </div>
                        
                        <div class="agent-stat">
                            <span class="stat-label">Status</span>
                            <span class="stat-value"><span class="status-indicator ${agent.status}">${agent.status}</span></span>
                        </div>
                        
                        <div class="agent-actions">
                            <button class="btn btn-secondary" onclick="viewAgentDetails('${agent.id}')">
                                👁️ View Details
                            </button>
                            
                            ${agent.status === 'idle' ? `
                                <button class="btn btn-primary" onclick="assignTask('${agent.id}')">
                                    📝 Assign Task
                                </button>
                            ` : `
                                <button class="btn btn-secondary" onclick="viewTask('${agent.id}')">
                                    📋 View Task
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function viewAgentDetails(agentId) {
            const agent = (currentStatus.agents || []).find(a => a.id === agentId);
            if (!agent) return;
            
            alert(`${agent.name} (${agent.pokemon})\n\nRole: ${agent.role}\nStatus: ${agent.status}\nCurrent Task: ${agent.task || 'None'}\n\nAgent is ready to assist with ${agent.role.toLowerCase()} tasks.`);
        }

        function assignTask(agentId) {
            const agent = (currentStatus.agents || []).find(a => a.id === agentId);
            if (!agent) return;
            
            const task = prompt(`Assign a task to ${agent.name}:`);
            if (!task) return;
            
            // In a real implementation, this would update the agent's task
            alert(`Task assigned to ${agent.name}!\n\nTask: ${task}\n\nThe agent will begin working on this task shortly.`);
        }

        function viewTask(agentId) {
            const agent = (currentStatus.agents || []).find(a => a.id === agentId);
            if (!agent) return;
            
            alert(`${agent.name} is currently working on:\n\n${agent.task || 'No active task'}\n\nStatus: In Progress\nETA: 2-3 hours`);
        }

        // Initial load
        fetch('/api/status')
            .then(res => res.json())
            .then(data => socket.emit('statusUpdate', data));
    </script>
</body>
</html>
