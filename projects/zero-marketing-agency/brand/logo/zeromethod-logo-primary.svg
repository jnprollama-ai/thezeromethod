<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="spiralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B829DD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background (transparent) -->
  
  <!-- Spiral Logo Mark -->
  <path d="M60,60 
           m-35,0 
           a35,35 0 1,1 70,0 
           a35,35 0 1,1 -70,0
           M60,60
           m-25,0
           a25,25 0 1,0 50,0
           a25,25 0 1,0 -50,0
           M60,60
           m-15,0
           a15,15 0 1,1 30,0
           a15,15 0 1,1 -30,0"
        fill="none"
        stroke="url(#spiralGradient)"
        stroke-width="6"
        stroke-linecap="round"
        transform="rotate(15, 60, 60)"
        opacity="0"/>
  
  <!-- Better Spiral -->
  <path d="M60,25 
           C85,25 95,45 95,60 
           C95,85 75,95 60,95 
           C35,95 25,75 25,60 
           C25,35 45,25 60,25 
           M60,42 
           C70,42 78,50 78,60 
           C78,72 68,78 60,78 
           C48,78 42,68 42,60 
           C42,48 52,42 60,42
           M60,55
           C63,55 65,57 65,60
           C65,64 62,65 60,65
           C56,65 55,62 55,60
           C55,56 58,55 60,55"
        fill="none"
        stroke="url(#spiralGradient)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- ZERO TEXT -->
  <text x="110" y="58" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="36" 
        font-weight="700" 
        fill="#0A0A0F">ZERO</text>
  
  <!-- METHOD TEXT -->
  <text x="110" y="82" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="14" 
        font-weight="500" 
        fill="#0A0A0F"
        letter-spacing="3">METHOD</text>
</svg>