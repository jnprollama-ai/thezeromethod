<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPENCLAW LIVE | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --border-color: #2d2d44;
            --text-primary: #e0e0ff;
            --text-secondary: #8b8bb0;
            --accent-cyan: #00d4ff;
            --accent-purple: #b829dd;
            --accent-amber: #ff9500;
            --accent-green: #00ff88;
            --accent-red: #ff3366;
            --accent-blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow: hidden; }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.03), rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 1000;
        }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        
        .header {
            background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);
            padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: relative;
        }
        .header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-name { font-size: 20px; font-weight: 700; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .brand-status { display: flex; align-items: center; gap: 6px; font-size: 11px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); animation: pulse 1.5s ease-in-out infinite; }
        .status-dot.offline { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); animation: none; }
        .status-dot.connecting { background: var(--accent-amber); box-shadow: 0 0 8px var(--accent-amber); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .header-right { display: flex; align-items: center; gap: 20px; }
        .connection-status { font-size: 11px; padding: 4px 12px; border-radius: 4px; }
        .connection-status.connected { background: rgba(0, 255, 136, 0.1); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .connection-status.disconnected { background: rgba(255, 51, 102, 0.1); color: var(--accent-red); border: 1px solid var(--accent-red); }
        .connection-status.connecting { background: rgba(255, 149, 0, 0.1); color: var(--accent-amber); border: 1px solid var(--accent-amber); }
        
        .tab-nav { display: flex; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 0 24px; }
        .tab-button {
            padding: 14px 24px; background: transparent; border: none; color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace; font-size: 13px; cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .tab-button:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.02); }
        .tab-button.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); background: rgba(0, 212, 255, 0.05); }
        .tab-badge { background: var(--accent-red); color: var(--bg-primary); font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 700; }
        
        .content-area { flex: 1; overflow: hidden; position: relative; }
        .tab-panel { display: none; height: 100%; padding: 20px; overflow-y: auto; }
        .tab-panel.active { display: block; }
        
        .panel { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 16px; }
        .panel-header { background: var(--bg-tertiary); padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-size: 13px; font-weight: 600; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 1px; }
        .panel-actions { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 12px; border: 1px solid var(--border-color); background: transparent; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 11px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .btn-sm:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sm.loading::after { content: '...'; animation: dots 1s infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; height: calc(100% - 20px); }
        .dashboard-left, .dashboard-right { display: flex; flex-direction: column; gap: 16px; }
        
        .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }
        .metric-card { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 6px; padding: 16px; }
        .metric-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .metric-value { font-size: 24px; font-weight: 700; color: var(--accent-cyan); margin-bottom: 8px; }
        .metric-value.error { color: var(--accent-red); }
        .metric-bar { height: 4px; background: var(--bg-primary); border-radius: 2px; overflow: hidden; }
        .metric-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
        
        .error-banner { background: rgba(255, 51, 102, 0.1); border: 1px solid var(--accent-red); border-radius: 6px; padding: 12px 16px; margin: 16px; color: var(--accent-red); font-size: 12px; }
        
        .mission-feed { padding: 12px; font-size: 12px; line-height: 1.6; max-height: 300px; overflow-y: auto; }
        .log-entry { padding: 8px 0; border-bottom: 1px solid rgba(45, 45, 68, 0.5); display: flex; gap: 12px; }
        .log-entry:last-child { border-bottom: none; }
        .log-timestamp { color: var(--text-secondary); font-size: 10px; white-space: nowrap; }
        .log-level { font-weight: 600; font-size: 10px; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; }
        .log-level.info { color: var(--accent-cyan); background: rgba(0, 212, 255, 0.1); }
        .log-level.success { color: var(--accent-green); background: rgba(0, 255, 136, 0.1); }
        .log-level.warn { color: var(--accent-amber); background: rgba(255, 149, 0, 0.1); }
        .log-level.error { color: var(--accent-red); background: rgba(255, 51, 102, 0.1); }
        .log-message { color: var(--text-primary); flex: 1; }
        
        .kanban-board { display: flex; gap: 16px; height: calc(100% - 60px); padding: 16px; overflow-x: auto; }
        .kanban-column { min-width: 280px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; display: flex; flex-direction: column; }
        .kanban-header { padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .kanban-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .kanban-count { background: var(--bg-primary); color: var(--text-secondary); font-size: 11px; padding: 2px 8px; border-radius: 10px; }
        .kanban-column.running .kanban-title { color: var(--accent-green); }
        .kanban-column.idle .kanban-title { color: var(--accent-amber); }
        .kanban-column.error .kanban-title { color: var(--accent-red); }
        .kanban-items { flex: 1; padding: 12px; overflow-y: auto; }
        
        .agent-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .agent-card:hover { border-color: var(--accent-cyan); transform: translateY(-2px); }
        .agent-card.selected { border-color: var(--accent-cyan); box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2); }
        .agent-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .agent-avatar { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
        .agent-avatar.main { background: rgba(0, 212, 255, 0.2); color: var(--accent-cyan); }
        .agent-avatar.cron { background: rgba(255, 149, 0, 0.2); color: var(--accent-amber); }
        .agent-info { flex: 1; }
        .agent-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
        .agent-role { font-size: 10px; color: var(--text-secondary); }
        .agent-status-badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; font-weight: 700; }
        .agent-status-badge.running { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); }
        .agent-status-badge.idle { background: rgba(255, 149, 0, 0.15); color: var(--accent-amber); }
        .agent-status-badge.error { background: rgba(255, 51, 102, 0.15); color: var(--accent-red); }
        .agent-task { font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; }
        .agent-meta { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--text-secondary); }
        .agent-progress-bar { height: 3px; background: var(--bg-primary); border-radius: 2px; overflow: hidden; margin-top: 8px; }
        .agent-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
        
        .cron-list { padding: 16px; }
        .cron-item { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 6px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .cron-item.running { border-left: 3px solid var(--accent-green); }
        .cron-item.error { border-left: 3px solid var(--accent-red); }
        .cron-item.disabled { opacity: 0.6; }
        .cron-info { flex: 1; }
        .cron-name { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .cron-schedule { font-size: 11px; color: var(--text-secondary); }
        .cron-status { display: flex; align-items: center; gap: 8px; }
        .cron-badge { font-size: 10px; padding: 2px 8px; border-radius: 3px; }
        .cron-badge.enabled { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); }
        .cron-badge.disabled { background: rgba(255, 51, 102, 0.15); color: var(--accent-red); }
        .cron-badge.running { background: rgba(0, 212, 255, 0.15); color: var(--accent-cyan); }
        
        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state-text { font-size: 14px; }
        
        .command-bar { background: var(--bg-secondary); border-top: 1px solid var(--border-color); padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
        .command-prompt { color: var(--accent-green); font-weight: 700; font-size: 16px; }
        .command-input { flex: 1; background: transparent; border: none; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; }
        .command-input::placeholder { color: var(--text-secondary); }
        .command-hint { font-size: 11px; color: var(--text-secondary); font-family: 'Inter', sans-serif; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-tertiary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        
        @media (max-width: 1200px) { .dashboard-grid { grid-template-columns: 1fr; } .kanban-board { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="brand">
                <div class="brand-name">◈ OPENCLAW LIVE</div>
                <div class="brand-status" id="connectionStatus">
                    <div class="status-dot connecting" id="statusDot"></div>
                    <span id="statusText">CONNECTING...</span>
                </div>
            </div>
            <div class="header-right">
                <span class="connection-status connecting" id="connBadge">CONNECTING</span>
            </div>
        </header>

        <nav class="tab-nav">
            <button class="tab-button active" data-tab="dashboard"><span>◈</span> Dashboard</button>
            <button class="tab-button" data-tab="agents"><span>◈</span> Agents <span class="tab-badge" id="agentCount">-</span></button>
            <button class="tab-button" data-tab="cron"><span>◈</span> Cron Jobs <span class="tab-badge" id="cronCount">-</span></button>
            <button class="tab-button" data-tab="logs"><span>◈</span> Logs</button>
        </nav>

        <div class="content-area">
            <!-- Dashboard -->
            <div class="tab-panel active" id="dashboard">
                <div class="dashboard-grid">
                    <div class="dashboard-left">
                        <div class="panel">
                            <div class="panel-header"><span class="panel-title">System Overview</span></div>
                            <div class="metrics-grid">
                                <div class="metric-card">
                                    <div class="metric-label">Active Agents</div>
                                    <div class="metric-value" id="activeAgents">-</div>
                                    <div class="metric-bar"><div class="metric-bar-fill" id="agentsBar" style="width: 0%; background: var(--accent-cyan);"></div></div>
                                </div>
                                <div class="metric-card">
                                    <div class="metric-label">Cron Jobs</div>
                                    <div class="metric-value" id="cronJobs">-</div>
                                    <div class="metric-bar"><div class="metric-bar-fill" id="cronBar" style="width: 0%; background: var(--accent-purple);"></div></div>
                                </div>
                                <div class="metric-card">
                                    <div class="metric-label">Last Refresh</div>
                                    <div class="metric-value" style="font-size: 16px;" id="lastRefresh">-</div>
                                </div>
                                <div class="metric-card">
                                    <div class="metric-label">Connection</div>
                                    <div class="metric-value" id="connStatus">-</div>
                                </div>
                            </div>
                        </div>
                        <div id="errorContainer"></div>
                    </div>
                    <div class="dashboard-right">
                        <div class="panel">
                            <div class="panel-header">
                                <span class="panel-title">Recent Activity</span>
                                <div class="panel-actions">
                                    <button class="btn-sm" onclick="clearLogs()">Clear</button>
                                </div>
                            </div>
                            <div class="mission-feed" id="activityFeed"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Agents Tab -->
            <div class="tab-panel" id="agents">
                <div class="panel" style="height: calc(100% - 20px);">
                    <div class="panel-header">
                        <span class="panel-title">Live Agent Status</span>
                        <div class="panel-actions">
                            <button class="btn-sm" onclick="refreshData()" id="refreshAgentsBtn">Refresh</button>
                            <button class="btn-sm" onclick="killSelectedAgent()" id="killBtn" disabled>Kill Selected</button>
                        </div>
                    </div>
                    <div class="kanban-board" id="agentBoard"></div>
                </div>
            </div>

            <!-- Cron Tab -->
            <div class="tab-panel" id="cron">
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">Scheduled Jobs</span>
                        <div class="panel-actions">
                            <button class="btn-sm" onclick="refreshData()">Refresh</button>
                            <button class="btn-sm" onclick="runSelectedCron()" id="runCronBtn" disabled>Run Selected</button>
                        </div>
                    </div>
                    <div class="cron-list" id="cronList"></div>
                </div>
            </div>

            <!-- Logs Tab -->
            <div class="tab-panel" id="logs">
                <div class="panel" style="height: calc(100% - 20px);">
                    <div class="panel-header">
                        <span class="panel-title">System Logs</span>
                        <div class="panel-actions">
                            <button class="btn-sm" onclick="clearLogs()">Clear</button>
                            <button class="btn-sm" onclick="exportLogs()">Export</button>
                        </div>
                    </div>
                    <div class="mission-feed" id="fullLogs" style="max-height: calc(100% - 50px);"></div>
                </div>
            </div>
        </div>

        <div class="command-bar">
            <span class="command-prompt">></span>
            <input type="text" class="command-input" id="commandInput" placeholder="Enter command... (try: 'refresh', 'agents', 'cron', 'clear')" autocomplete="off">
            <span class="command-hint">Press ENTER</span>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = 'http://localhost:3000'; // Default OpenClaw gateway
        let selectedAgent = null;
        let selectedCron = null;
        let agents = [];
        let cronJobs = [];

        // Logging
        function addLog(level, message) {
            const time = new Date().toTimeString().split(' ')[0];
            const entry = `
                <div class="log-entry">
                    <span class="log-timestamp">${time}</span>
                    <span class="log-level ${level}">${level}</span>
                    <span class="log-message">${message}</span>
                </div>
            `;
            const feed = document.getElementById('activityFeed');
            const fullLogs = document.getElementById('fullLogs');
            if (feed) feed.insertAdjacentHTML('afterbegin', entry);
            if (fullLogs) fullLogs.insertAdjacentHTML('afterbegin', entry);
        }

        // API Calls
        async function fetchAgents() {
            try {
                const response = await fetch(`${API_BASE}/api/subagents?action=list`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                return data.subagents || [];
            } catch (err) {
                throw new Error(`Failed to fetch agents: ${err.message}`);
            }
        }

        async function fetchCronJobs() {
            try {
                const response = await fetch(`${API_BASE}/api/cron?action=list`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                return data.jobs || [];
            } catch (err) {
                throw new Error(`Failed to fetch cron jobs: ${err.message}`);
            }
        }

        async function killAgent(target) {
            try {
                const response = await fetch(`${API_BASE}/api/subagents?action=kill&target=${target}`, { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                throw new Error(`Failed to kill agent: ${err.message}`);
            }
        }

        async function runCron(jobId) {
            try {
                const response = await fetch(`${API_BASE}/api/cron?action=run&jobId=${jobId}`, { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                throw new Error(`Failed to run cron: ${err.message}`);
            }
        }

        // UI Rendering
        function renderAgents() {
            const board = document.getElementById('agentBoard');
            if (!board) return;

            if (agents.length === 0) {
                board.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👻</div>
                        <div class="empty-state-text">No active agents found</div>
                    </div>
                `;
                document.getElementById('agentCount').textContent = '0';
                document.getElementById('activeAgents').textContent = '0';
                document.getElementById('agentsBar').style.width = '0%';
                return;
            }

            // Group by status
            const running = agents.filter(a => a.status === 'running');
            const idle = agents.filter(a => a.status === 'idle');
            const error = agents.filter(a => a.status === 'error');

            const columns = [
                { key: 'running', title: 'Running', color: '#00ff88', agents: running },
                { key: 'idle', title: 'Idle', color: '#ff9500', agents: idle },
                { key: 'error', title: 'Error', color: '#ff3366', agents: error }
            ];

            board.innerHTML = columns.map(col => `
                <div class="kanban-column ${col.key}">
                    <div class="kanban-header">
                        <span class="kanban-title" style="color: ${col.color}">${col.title}</span>
                        <span class="kanban-count">${col.agents.length}</span>
                    </div>
                    <div class="kanban-items">
                        ${col.agents.map(agent => `
                            <div class="agent-card ${selectedAgent === agent.id ? 'selected' : ''}" onclick="selectAgent('${agent.id}')">
                                <div class="agent-header">
                                    <div class="agent-avatar ${agent.type || 'main'}">${agent.id.slice(0,2)}</div>
                                    <div class="agent-info">
                                        <div class="agent-name">${agent.name || agent.id}</div>
                                        <div class="agent-role">${agent.role || 'Subagent'}</div>
                                    </div>
                                    <span class="agent-status-badge ${agent.status}">${agent.status}</span>
                                </div>
                                <div class="agent-task">${agent.task || 'No active task'}</div>
                                <div class="agent-meta">
                                    <span>${agent.runtime || 'Unknown runtime'}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('agentCount').textContent = agents.length;
            document.getElementById('activeAgents').textContent = running.length;
            document.getElementById('agentsBar').style.width = Math.min((running.length / Math.max(agents.length, 1)) * 100, 100) + '%';
        }

        function renderCronJobs() {
            const list = document.getElementById('cronList');
            if (!list) return;

            if (cronJobs.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📅</div>
                        <div class="empty-state-text">No cron jobs configured</div>
                    </div>
                `;
                document.getElementById('cronCount').textContent = '0';
                document.getElementById('cronJobs').textContent = '0';
                document.getElementById('cronBar').style.width = '0%';
                return;
            }

            list.innerHTML = cronJobs.map(job => {
                const nextRun = job.state?.nextRunAtMs ? new Date(job.state.nextRunAtMs).toLocaleString() : 'Unknown';
                const isRunning = job.state?.runningAtMs && !job.state?.lastRunAtMs;
                const hasError = job.state?.lastRunStatus === 'error';
                
                return `
                    <div class="cron-item ${selectedCron === job.id ? 'selected' : ''} ${isRunning ? 'running' : ''} ${hasError ? 'error' : ''} ${!job.enabled ? 'disabled' : ''}" onclick="selectCron('${job.id}')">
                        <div class="cron-info">
                            <div class="cron-name">${job.name || job.id}</div>
                            <div class="cron-schedule">
                                ${job.schedule?.kind === 'cron' ? `Cron: ${job.schedule.expr}` : 
                                  job.schedule?.kind === 'every' ? `Every ${job.schedule.everyMs}ms` : 
                                  'One-time'} | Next: ${nextRun}
                            </div>
                        </div>
                        <div class="cron-status">
                            <span class="cron-badge ${job.enabled ? 'enabled' : 'disabled'}">${job.enabled ? 'ENABLED' : 'DISABLED'}</span>
                            ${isRunning ? '<span class="cron-badge running">RUNNING</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');

            const enabledCount = cronJobs.filter(j => j.enabled).length;
            document.getElementById('cronCount').textContent = cronJobs.length;
            document.getElementById('cronJobs').textContent = enabledCount;
            document.getElementById('cronBar').style.width = Math.min((enabledCount / cronJobs.length) * 100, 100) + '%';
        }

        // Selection
        function selectAgent(id) {
            selectedAgent = selectedAgent === id ? null : id;
            document.getElementById('killBtn').disabled = !selectedAgent;
            renderAgents();
        }

        function selectCron(id) {
            selectedCron = selectedCron === id ? null : id;
            document.getElementById('runCronBtn').disabled = !selectedCron;
            renderCronJobs();
        }

        // Actions
        async function killSelectedAgent() {
            if (!selectedAgent) return;
            const btn = document.getElementById('killBtn');
            btn.classList.add('loading');
            btn.disabled = true;
            
            try {
                await killAgent(selectedAgent);
                addLog('success', `Killed agent ${selectedAgent}`);
                selectedAgent = null;
                await refreshData();
            } catch (err) {
                addLog('error', err.message);
                showError(err.message);
            } finally {
                btn.classList.remove('loading');
                btn.disabled = true;
            }
        }

        async function runSelectedCron() {
            if (!selectedCron) return;
            const btn = document.getElementById('runCronBtn');
            btn.classList.add('loading');
            btn.disabled = true;
            
            try {
                await runCron(selectedCron);
                addLog('success', `Triggered cron job ${selectedCron}`);
                selectedCron = null;
                await refreshData();
            } catch (err) {
                addLog('error', err.message);
                showError(err.message);
            } finally {
                btn.classList.remove('loading');
                btn.disabled = true;
            }
        }

        function showError(message) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `<div class="error-banner">⚠ ${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        // Main refresh
        async function refreshData() {
            const btn = document.getElementById('refreshAgentsBtn');
            if (btn) btn.classList.add('loading');

            try {
                [agents, cronJobs] = await Promise.all([
                    fetchAgents().catch(() => []),
                    fetchCronJobs().catch(() => [])
                ]);

                renderAgents();
                renderCronJobs();

                document.getElementById('statusDot').className = 'status-dot';
                document.getElementById('statusText').textContent = 'LIVE';
                document.getElementById('connBadge').className = 'connection-status connected';
                document.getElementById('connBadge').textContent = 'CONNECTED';
                document.getElementById('connStatus').textContent = 'ONLINE';
                document.getElementById('connStatus').className = 'metric-value';
                document.getElementById('lastRefresh').textContent = new Date().toTimeString().split(' ')[0];

                addLog('info', `Refreshed: ${agents.length} agents, ${cronJobs.length} cron jobs`);
            } catch (err) {
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').textContent = 'OFFLINE';
                document.getElementById('connBadge').className = 'connection-status disconnected';
                document.getElementById('connBadge').textContent = 'DISCONNECTED';
                document.getElementById('connStatus').textContent = 'OFFLINE';
                document.getElementById('connStatus').className = 'metric-value error';
                addLog('error', 'Connection failed: ' + err.message);
                showError('Cannot connect to OpenClaw gateway. Is it running on port 3000?');
            } finally {
                if (btn) btn.classList.remove('loading');
            }
        }

        // Command handling
        document.getElementById('commandInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const cmd = this.value.trim();
                if (!cmd) return;
                
                addLog('info', `> ${cmd}`);
                this.value = '';

                switch(cmd.toLowerCase()) {
                    case 'refresh':
                    case 'reload':
                        refreshData();
                        break;
                    case 'agents':
                        switchTab('agents');
                        break;
                    case 'cron':
                    case 'jobs':
                        switchTab('cron');
                        break;
                    case 'logs':
                        switchTab('logs');
                        break;
                    case 'clear':
                        clearLogs();
                        break;
                    case 'help':
                        addLog('info', 'Commands: refresh, agents, cron, logs, clear, help');
                        break;
                    default:
                        addLog('warn', `Unknown command: ${cmd}`);
                }
            }
        });

        // Tab switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // Clear logs
        function clearLogs() {
            document.getElementById('activityFeed').innerHTML = '';
            document.getElementById('fullLogs').innerHTML = '';
            addLog('info', 'Logs cleared');
        }

        // Export logs
        function exportLogs() {
            const logs = document.getElementById('fullLogs').innerText;
            const blob = new Blob([logs], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `openclaw-logs-${Date.now()}.txt`;
            a.click();
            addLog('success', 'Logs exported');
        }

        // Initialize
        addLog('info', 'Command Center initialized');
        addLog('info', 'Connecting to OpenClaw gateway...');
        refreshData();

        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
