<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◈ ZERO Command Center | LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #e0e0ff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #12121a, #0a0a0f);
            border-bottom: 1px solid #2d2d44;
        }
        h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(90deg, #00d4ff, #b829dd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle { color: #8b8bb0; font-size: 16px; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0,212,255,0.3);
            box-shadow: 0 20px 40px rgba(0,212,255,0.1);
        }
        .stat-value {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #fff, #e0e0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 12px;
            color: #8b8bb0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Sections */
        .section {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
        }
        .section h2 {
            color: #00d4ff;
            font-size: 24px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        /* Agent Grid */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .agent-card {
            background: linear-gradient(145deg, rgba(0,212,255,0.1), rgba(0,212,255,0.05));
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .agent-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(0,212,255,0.4);
        }
        .agent-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(0,212,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .agent-card:hover::before { opacity: 1; }
        .agent-img {
            width: 70px;
            height: 70px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
        .agent-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }
        .agent-role {
            font-size: 13px;
            color: #00d4ff;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .hp-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .hp-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }
        .agent-task {
            font-size: 12px;
            color: #8b8bb0;
            margin-top: 10px;
            padding: 6px 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            display: inline-block;
        }
        
        /* Project Cards */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border-left: 4px solid transparent;
            transition: all 0.3s;
        }
        .project-item:hover {
            background: rgba(255,255,255,0.1);
            border-left-color: #00d4ff;
        }
        .project-name { font-weight: 600; font-size: 16px; }
        .project-status {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(0,255,136,0.15);
            color: #00ff88;
        }
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }
        
        /* Revenue Section */
        .revenue-section {
            background: linear-gradient(145deg, rgba(0,255,136,0.05), rgba(0,212,255,0.05));
            border: 1px solid rgba(0,255,136,0.2);
        }
        .revenue-input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .revenue-input {
            flex: 1;
            min-width: 200px;
            padding: 15px;
            background: rgba(10,10,15,0.5);
            border: 2px solid rgba(0,212,255,0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        .revenue-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
        }
        .btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 10px;
            color: #0a0a0f;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,255,136,0.3);
        }
        .revenue-list {
            margin-top: 20px;
        }
        .revenue-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }
        .revenue-entry:last-child { border-bottom: none; }
        .rev-amount { font-weight: 600; color: #00ff88; }
        .rev-source { color: #8b8bb0; font-size: 12px; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .agent-grid { grid-template-columns: repeat(2, 1fr); }
            .revenue-input-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>◈ ZERO COMMAND CENTER</h1>
            <p class="subtitle">Complete System - Goals, Agents, Trading & Projects</p>
        </header>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="rev">$0</div>
                <div class="stat-label">Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="target" style="color: #00d4ff;">$500</div>
                <div class="stat-label">Target</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="agents" style="color: #b829dd;">5</div>
                <div class="stat-label">Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="projs" style="color: #ff9500;">3</div>
                <div class="stat-label">Projects</div>
            </div>
        </div>

        <!-- Goals Section -->
        <div class="section revenue-section">
            <h2>🎯 Revenue Goals</h2>
            <div class="revenue-input-group">
                <input type="number" class="revenue-input" id="amount" placeholder="Amount ($)" />
                <input type="text" class="revenue-input" id="source" placeholder="Source (zma, affiliates, etc.)" />
                <button class="btn" onclick="addRevenue()">Add Revenue</button>
            </div>
            <div class="revenue-list" id="revList"></div>
        </div>

        <!-- Agents Grid -->
        <div class="section">
            <h2>🏢 Pokemon Agents</h2>
            <div class="agent-grid" id="agentGrid"></div>
        </div>

        <!-- Projects -->
        <div class="section">
            <h2>🚀 Active Projects</h2>
            <div class="project-list" id="projectList"></div>
        </div>
    </div>

    <script>
        // ===== DATA STORE =====
        const STORE = {
            revenue: { current: 0, target: 500, history: [] },
            agents: [
                { id: 'zero', name: 'Zero', pokemon: 'Mewtwo', role: 'Commander', type: 'Psychic', status: 'active', task: 'Operations', hp: 100, maxHp: 100 },
                { id: 'research', name: 'Research', pokemon: 'Alakazam', role: 'Analyst', type: 'Psychic', status: 'busy', task: 'Market Research', hp: 85, maxHp: 100 },
                { id: 'content', name: 'Content', pokemon: 'Rapidash', role: 'Creator', type: 'Fire', status: 'active', task: 'Content', hp: 90, maxHp: 100 },
                { id: 'seo', name: 'SEO', pokemon: 'Porygon', role: 'Optimizer', type: 'Digital', status: 'active', task: 'SEO', hp: 95, maxHp: 100 },
                { id: 'social', name: 'Social', pokemon: 'Jigglypuff', role: 'Engager', type: 'Fairy', status: 'active', task: 'Social Media', hp: 80, maxHp: 100 }
            ],
            projects: [
                { id: 1, name: 'Zero Marketing Agency', status: 'live', progress: 95, revenue: 0 },
                { id: 2, name: 'Trading Dashboard', status: 'active', progress: 25, revenue: 0 },
                { id: 3, name: 'Zero SaaS Tools', status: 'planning', progress: 10, revenue: 0 }
            ],
            trading: {
                watchlist: [
                    { symbol: 'AAPL', price: 185.50, change: 1.2 },
                    { symbol: 'GOOGL', price: 142.30, change: -0.5 },
                    { symbol: 'TSLA', price: 245.60, change: 3.1 },
                    { symbol: 'BTC', price: 68200, change: 2.5 }
                ],
                positions: []
            }
        };

        // ===== RENDER FUNCTIONS =====
        function render() {
            // Revenue
            document.getElementById('rev').textContent = '$' + STORE.revenue.current;
            
            // Agents
            const agentHTML = STORE.agents.map(agent => `
                <div class="agent-card" onclick="viewAgent('${agent.id}')">
                    <img src="https://play.pokemonshowdown.com/sprites/gen5ani/${agent.pokemon.toLowerCase()}.gif" class="agent-img" alt="${agent.name}">
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-role">${agent.role} - ${agent.task}</div>
                    <div class="hp-bar"><div class="hp-fill" style="width:${(agent.hp/agent.maxHp)*100}%;background:${agent.hp>50?'#00ff88':'#ff9500'}"></div></div>
                    <div class="agent-task">${agent.task}</div>
                </div>
            `).join('');
            document.getElementById('agentGrid').innerHTML = agentHTML;
            
            // Projects
            const projHTML = STORE.projects.map(p => `
                <div class="project-item">
                    <div>
                        <div class="project-name">${p.name}</div>
                        <div style="font-size:12px;color:#8b8bb0;margin-top:5px;">Progress: ${p.progress}%</div>
                    </div>
                    <span class="project-status">${p.status.toUpperCase()}</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%;background:${p.progress>80?'#00ff88':p.progress>50?'#00d4ff':'#ff9500'}"></div></div>
            `).join('');
            document.getElementById('projectList').innerHTML = projHTML;
            
            // Revenue history
            const revHTML = STORE.revenue.history.slice(-10).map(r => `
                <div class="revenue-entry">
                    <span>$${r.amount} - ${r.source}</span>
                    <span class="rev-amount">${new Date(r.date).toLocaleTimeString()}</span>
                </div>
            `).join('');
            document.getElementById('revList').innerHTML = revHTML || '<p style="color:#666;text-align:center;padding:20px;">No revenue yet. Add some!</p>';
        }

        // ===== INTERACTIVITY =====
        function addRevenue() {
            const amt = document.getElementById('amount').value;
            const src = document.getElementById('source').value || 'manual';
            if (!amt) return alert('Enter amount');
            
            STORE.revenue.current += parseFloat(amt);
            STORE.revenue.history.push({ amount: parseFloat(amt), source: src, date: new Date() });
            if (STORE.revenue.history.length > 20) STORE.revenue.history.shift();
            
            render();
            
            // In real app, this would save to backend
            console.log('Revenue added:', amt, src);
        }

        function viewAgent(id) {
            const agent = STORE.agents.find(a => a.id === id);
            if (agent) {
                alert(`${agent.name} is ${agent.status} and working on: ${agent.task}`);
            }
        }

        // Auto-simulate movement
        setInterval(() => {
            STORE.agents.forEach(agent => {
                if (Math.random() > 0.7) {
                    agent.hp = Math.max(0, Math.min(agent.maxHp, agent.hp + (Math.random()-0.5)*10));
                }
            });
            render();
        }, 2000);

        // Initial render
        render();
        console.log('✅ Command Center loaded - All systems go');
        console.log('💰 Revenue tracking active');
        console.log('🏢 Agent tracking active');
        console.log('📊 Project tracking active');
    </script>
</body>
</html>
