<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◈ ZERO Command Center | LIVE</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e0e0ff;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(180deg, #12121a, #0a0a0f);
            border-bottom: 1px solid #2d2d44;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            background: linear-gradient(90deg, #00d4ff, #b829dd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
        }
        .header p { color: #8b8bb0; font-size: 14px; margin-top: 5px; }
        .container { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(145deg, #12121a, #1a1a2e);
            border: 1px solid #2d2d44;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        .stat-value { font-size: 36px; font-weight: 700; color: #00ff88; }
        .stat-label { font-size: 12px; color: #8b8bb0; margin-top: 5px; }
        .section {
            background: linear-gradient(145deg, #12121a, #1a1a2e);
            border: 1px solid #2d2d44;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .section h2 {
            color: #00d4ff;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .agent-card {
            background: rgba(0,212,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }
        .agent-card:hover { transform: translateY(-5px); }
        .agent-img { width: 60px; height: 60px; image-rendering: pixelated; margin-bottom: 10px; }
        .agent-name { font-weight: 600; color: #00d4ff; }
        .agent-role { font-size: 12px; color: #8b8bb0; }
        .hp-bar { height: 6px; background: #2d2d44; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .hp-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .revenue-input { display: flex; gap: 10px; margin-top: 20px; }
        .revenue-input input {
            flex: 1;
            padding: 12px;
            background: rgba(10,10,15,0.5);
            border: 1px solid #2d2d44;
            border-radius: 8px;
            color: #e0e0ff;
        }
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00d4ff, #b829dd);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        #status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 8px;
            color: #00ff88;
        }
        .disconnected {
            background: rgba(255,68,68,0.1) !important;
            border-color: rgba(255,68,68,0.3) !important;
            color: #ff4444 !important;
        }
    </style>
</head>
<body>
    <div id="status">Connecting...</div>
    
    <header class="header">
        <h1>◈ ZERO COMMAND CENTER</h1>
        <p>Glitch Edition - Live Data with SQLite</p>
    </header>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="revenue">$0</div>
                <div class="stat-label">Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="target">$500</div>
                <div class="stat-label">Target</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="agents-online">5</div>
                <div class="stat-label">Agents Online</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="projects-active">3</div>
                <div class="stat-label">Active Projects</div>
            </div>
        </div>
        
        <div class="section">
            <h2>🏢 Pokemon Agents</h2>
            <div id="agents" class="agent-grid"></div>
        </div>
        
        <div class="section">
            <h2>💰 Add Revenue</h2>
            <p style="color: #8b8bb0; margin-bottom: 15px;">Data persists to SQLite database. Refresh to see updates.</p>
            <div class="revenue-input">
                <input type="number" id="amount" placeholder="Amount ($)" />
                <input type="text" id="source" placeholder="Source (zma, affiliates, etc.)" />
                <button class="btn" onclick="addRevenue()">Add Revenue</button>
            </div>
        </div>
        
        <div class="section">
            <h2>🚀 Projects</h2>
            <div id="projects"></div>
        </div>
    </div>
    
    <script>
        const socket = io();
        
        socket.on('connect', () => {
            document.getElementById('status').textContent = '✅ Connected (Live)';
            document.getElementById('status').classList.remove('disconnected');
        });
        
        socket.on('disconnect', () => {
            document.getElementById('status').textContent = '❌ Disconnected';
            document.getElementById('status').classList.add('disconnected');
        });
        
        socket.on('update', () => loadData());
        
        function loadData() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => updateUI(data))
                .catch(e => console.error('Failed:', e));
        }
        
        function updateUI(data) {
            if (data.revenue) {
                document.getElementById('revenue').textContent = `$${data.revenue.current || 0}`;
            }
            
            if (data.agents) {
                document.getElementById('agents').innerHTML = data.agents.map(agent => `
                    <div class="agent-card">
                        <img src="https://play.pokemonshowdown.com/sprites/gen5ani/${agent.pokemon.toLowerCase()}.gif" 
                             alt="${agent.name}" class="agent-img">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-role">${agent.role} - ${agent.task}</div>
                        <div class="hp-bar">
                            <div class="hp-fill" style="width: ${(agent.hp / agent.max_hp) * 100}%; 
                                 background: ${agent.hp > 50 ? '#00ff88' : '#ff9500'};"></div>
                        </div>
                    </div>
                `).join('');
            }
            
            if (data.projects) {
                document.getElementById('projects').innerHTML = data.projects.map(proj => `
                    <div style="margin-bottom: 15px; padding: 15px; background: rgba(10,10,15,0.5); border-radius: 10px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span>${proj.name}</span>
                            <span style="color: ${proj.status === 'live' ? '#00ff88' : '#00d4ff'}">${proj.status.toUpperCase()}</span>
                        </div>
                        <div style="height: 8px; background: #2d2d44; border-radius: 4px; overflow: hidden;">
                            <div style="width: ${proj.progress}%; height: 100%; background: linear-gradient(90deg, #00d4ff, #b829dd); border-radius: 4px;"></div>
                        </div>
                        <div style="text-align: right; font-size: 12px; color: #8b8bb0; margin-top: 5px;">${proj.progress}%</div>
                    </div>
                `).join('');
            }
        }
        
        async function addRevenue() {
            const amount = document.getElementById('amount').value;
            const source = document.getElementById('source').value || 'manual';
            
            if (!amount) return;
            
            try {
                await fetch('/api/revenue', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: parseFloat(amount), source })
                });
                document.getElementById('amount').value = '';
                document.getElementById('source').value = '';
                loadData();
            } catch (e) {
                console.error('Failed:', e);
            }
        }
        
        // Initial load
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
