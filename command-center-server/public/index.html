<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◈ ZERO COMMAND CENTER | Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --border-color: #2d2d44;
            --text-primary: #e0e0ff;
            --text-secondary: #8b8bb0;
            --accent-cyan: #00d4ff;
            --accent-purple: #b829dd;
            --accent-green: #00ff88;
            --accent-red: #ff3366;
            --accent-amber: #ff9500;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        
        .header { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-purple), transparent); animation: scan 4s linear infinite; }
        @keyframes scan { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-logo { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
        .brand-name { font-size: 18px; font-weight: 700; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-tabs { display: flex; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 0 24px; gap: 4px; }
        .nav-tab { padding: 14px 20px; background: transparent; border: none; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .nav-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.02); }
        .nav-tab.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); background: rgba(0, 212, 255, 0.05); }
        
        .main-content { flex: 1; padding: 24px; max-width: 1600px; margin: 0 auto; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .dashboard-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-6 { grid-column: span 6; }
        .col-8 { grid-column: span 8; }
        .col-12 { grid-column: span 12; }
        
        .card { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; transition: all 0.3s; }
        .card:hover { border-color: var(--accent-cyan); }
        .card-header { padding: 16px 20px; background: #16162a; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 14px; font-weight: 600; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .card-body { padding: 20px; }
        
        .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent-green); }
        .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* Project Cards - Enhanced */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
        }
        
        .project-card {
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-tertiary));
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }
        
        .project-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-cyan);
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.15), 0 0 30px rgba(0, 212, 255, 0.1);
        }
        
        .project-card:hover::before {
            transform: scaleX(1);
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .project-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(184,41,221,0.2));
            border: 2px solid rgba(0,212,255,0.3);
            transition: all 0.3s;
        }
        
        .project-card:hover .project-icon {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        
        .project-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .project-status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite;
        }
        
        .project-status-badge.live {
            background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,255,136,0.1));
            color: var(--accent-green);
            border: 1px solid rgba(0,255,136,0.4);
            box-shadow: 0 0 10px rgba(0,255,136,0.3);
        }
        
        .project-status-badge.dev {
            background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,212,255,0.1));
            color: var(--accent-cyan);
            border: 1px solid rgba(0,212,255,0.4);
        }
        
        .project-status-badge.planning {
            background: linear-gradient(135deg, rgba(255,149,0,0.2), rgba(255,149,0,0.1));
            color: var(--accent-amber);
            border: 1px solid rgba(255,149,0,0.4);
        }
        
        .project-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .project-progress-section {
            margin-bottom: 20px;
        }
        
        .project-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }
        
        .project-progress-label {
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .project-progress-value {
            color: var(--accent-cyan);
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .project-progress-bar {
            height: 10px;
            background: var(--bg-primary);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        
        .project-progress-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .project-progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .project-team-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        
        .project-team {
            display: flex;
            gap: -8px;
        }
        
        .team-member {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 3px solid var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: -10px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .team-member:first-child { margin-left: 0; }
        
        .team-member:hover {
            transform: scale(1.2) translateY(-5px);
            z-index: 10;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .team-member img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            image-rendering: pixelated;
        }
        
        .project-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .project-updated {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        .project-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        
        .project-stat {
            text-align: center;
        }
        
        .project-stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-cyan);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .project-stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        
        /* Pokemon Office */
        .pokemon-office { position: absolute; z-index: 100; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: all 0.3s; }
        .pokemon-office img { width: 90px; height: 90px; image-rendering: pixelated; filter: drop-shadow(0 0 15px rgba(0,212,255,0.4)); transition: all 0.3s; }
        .pokemon-office:hover img { transform: scale(1.2); filter: drop-shadow(0 0 25px rgba(0,212,255,0.8)); }
        .pokemon-office .pokemon-info { margin-top: -10px; text-align: center; opacity: 0; transition: opacity 0.2s; background: var(--bg-secondary); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--accent-cyan); }
        .pokemon-office:hover .pokemon-info { opacity: 1; }
        
        .task-item { display: flex; align-items: center; padding: 16px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--border-color); border-left: 3px solid var(--accent-cyan); margin-bottom: 12px; transition: all 0.2s; }
        .task-item:hover { border-color: var(--accent-cyan); transform: translateX(4px); }
        .task-sprite { width: 48px; height: 48px; margin-right: 16px; border-radius: 8px; background: var(--bg-tertiary); overflow: hidden; }
        .task-sprite img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        .task-info { flex: 1; }
        .task-title { font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .task-meta { font-size: 12px; color: var(--text-secondary); }
        .task-progress-wrapper { width: 100px; margin-right: 16px; }
        .task-progress-bar-bg { height: 8px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; }
        .task-progress-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .task-status { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .task-status.running { background: rgba(0, 212, 255, 0.15); color: var(--accent-cyan); }
        .task-status.complete { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); }
        .task-status.pending { background: rgba(255, 149, 0, 0.15); color: var(--accent-amber); }
        
        .agent-card { display: flex; gap: 20px; padding: 24px; background: var(--bg-secondary); border-radius: 12px; border: 1px solid var(--border-color); transition: all 0.3s; }
        .agent-card:hover { border-color: var(--accent-cyan); transform: translateY(-4px); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .agent-sprite-box { width: 120px; height: 120px; background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-primary)); border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--border-color); overflow: hidden; }
        .agent-sprite-box img { width: 100px; height: 100px; object-fit: contain; image-rendering: pixelated; }
        .agent-name { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
        .agent-pokemon { font-size: 13px; color: var(--accent-cyan); }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge.type-psychic { background: rgba(255,105,180,0.15); color: #ff69b4; border: 1px solid rgba(255,105,180,0.3); }
        .badge.type-fire { background: rgba(255,69,0,0.15); color: #ff4500; border: 1px solid rgba(255,69,0,0.3); }
        .badge.type-digital { background: rgba(0,212,255,0.15); color: var(--accent-cyan); border: 1px solid rgba(0,212,255,0.3); }
        .badge.type-fairy { background: rgba(255,192,203,0.15); color: #ffc0cb; border: 1px solid rgba(255,192,203,0.3); }
        
        .console { background: #000; border-radius: 8px; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent-green); height: 400px; overflow-y: auto; border: 1px solid var(--border-color); }
        .console-line { margin-bottom: 6px; display: flex; gap: 12px; }
        .console-time { color: var(--text-secondary); min-width: 80px; }
        .console-prompt { color: var(--accent-cyan); margin-right: 8px; }
        
        .loading-overlay { position: fixed; inset: 0; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-spinner { width: 60px; height: 60px; border: 4px solid var(--border-color); border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 1200px) { .col-3, .col-4 { grid-column: span 6; } .agent-card { flex-direction: column; } }
        @media (max-width: 768px) { .col-3, .col-4, .col-6 { grid-column: span 12; } .projects-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div style="margin-top: 20px; color: var(--accent-cyan); font-family: 'JetBrains Mono', monospace;">Initializing Command Center...</div>
    </div>

    <header class="header">
        <div class="brand">
            <div class="brand-logo">◈</div>
            <div class="brand-name">ZERO COMMAND CENTER</div>
        </div>
        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>LIVE SERVER</span>
        </div>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('office')">◈ Office</button>
        <button class="nav-tab" onclick="switchTab('projects')">◈ Projects</button>
        <button class="nav-tab" onclick="switchTab('tasks')">◈ Tasks</button>
        <button class="nav-tab" onclick="switchTab('agents')">◈ Agents</button>
        <button class="nav-tab" onclick="switchTab('console')">◈ Console</button>
    </nav>

    <div class="main-content">
        <!-- Office Tab -->
        <div class="tab-panel active" id="office">
            <div class="dashboard-grid">
                <div class="card col-8">
                    <div class="card-header">
                        <div class="card-title">🏢 Live Pokemon Office</div>
                        <div class="live-indicator">
                            <div class="live-dot"></div>
                            <span>Real-time</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div style="position: relative; height: 450px; background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0f 100%); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color);">
                            <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 35%; background: linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px), linear-gradient(0deg, rgba(0,212,255,0.05) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg); transform-origin: bottom;"></div>
                            <div id="officeSpace"></div>
                        </div>
                    </div>
                </div>

                <div class="card col-4">
                    <div class="card-header">
                        <div class="card-title">📋 Active Tasks</div>
                    </div>
                    <div class="card-body" id="taskList"></div>
                </div>
                
                <!-- Mini Projects Preview -->
                <div class="card col-12">
                    <div class="card-header">
                        <div class="card-title">🚀 Quick Project Overview</div>
                        <button onclick="switchTab('projects')" style="background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 12px; transition: all 0.2s;">View All →</button>
                    </div>
                    <div class="card-body" id="miniProjects"></div>
                </div>
            </div>
        </div>

        <!-- Projects Tab - Enhanced -->
        <div class="tab-panel" id="projects">
            <div class="card col-12">
                <div class="card-header">
                    <div class="card-title">🚀 Active Projects</div>
                    <div class="live-indicator">
                        <div class="live-dot"></div>
                        <span>Real-time Updates</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="projects-grid" id="projectsGrid"></div>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="tasks">
            <div class="card col-12">
                <div class="card-header"><div class="card-title">📋 All Tasks</div></div>
                <div class="card-body" id="allTasksList"></div>
            </div>
        </div>

        <div class="tab-panel" id="agents">
            <div class="card col-12">
                <div class="card-header"><div class="card-title">🎮 Agent Roster</div></div>
                <div class="card-body"><div id="agentRoster" style="display: flex; flex-direction: column; gap: 20px;"></div></div>
            </div>
        </div>

        <div class="tab-panel" id="console">
            <div class="card col-12">
                <div class="card-header"><div class="card-title">💻 System Console</div></div>
                <div class="card-body"><div class="console" id="consoleOutput"><div class="console-line"><span class="console-time">Connecting...</span></div></div></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentData = {};
        
        function switchTab(tabId) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
        
        function getProgressColor(progress) {
            if (progress >= 80) return 'linear-gradient(90deg, var(--accent-green), #00cc6a)';
            if (progress >= 50) return 'linear-gradient(90deg, var(--accent-cyan), var(--accent-purple))';
            if (progress >= 20) return 'linear-gradient(90deg, var(--accent-amber), var(--accent-cyan))';
            return 'linear-gradient(90deg, var(--accent-red), var(--accent-amber))';
        }
        
        function getStatusIcon(status) {
            const icons = {
                'live': '🟢',
                'active': '🔵',
                'phase1': '🟡',
                'planning': '🟠',
                'dev': '🔧'
            };
            return icons[status] || '⚪';
        }
        
        function getStatusClass(status) {
            const classes = {
                'live': 'live',
                'active': 'live',
                'phase1': 'dev',
                'dev': 'dev',
                'planning': 'planning'
            };
            return classes[status] || 'planning';
        }
        
        function getStatusLabel(status) {
            const labels = {
                'live': 'LIVE',
                'active': 'ACTIVE',
                'phase1': 'PHASE 1',
                'dev': 'IN DEV',
                'planning': 'PLANNING'
            };
            return labels[status] || status.toUpperCase();
        }
        
        function renderOffice(agents) {
            const office = document.getElementById('officeSpace');
            office.innerHTML = '';
            const positions = [
                { id: 'zero', bottom: '35%', left: '38%' },
                { id: 'research', bottom: '35%', left: '8%' },
                { id: 'content', bottom: '35%', right: '8%' },
                { id: 'seo', bottom: '50%', left: '22%' },
                { id: 'social', bottom: '50%', right: '22%' }
            ];
            
            agents.forEach((agent, i) => {
                const pos = positions[i] || { bottom: '40%', left: '45%' };
                const div = document.createElement('div');
                div.className = 'pokemon-office';
                div.style.cssText = `bottom: ${pos.bottom}; left: ${pos.left}; right: ${pos.right};`;
                div.innerHTML = `
                    <img src="${agent.sprite}" alt="${agent.pokemon}" class="status-${agent.status}">
                    <div class="pokemon-info">
                        <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent-cyan); font-weight: 600;">${agent.name}</div>
                        <div style="font-size: 9px; color: var(--text-secondary); margin-top: 2px;">${agent.task}</div>
                        <div style="width: 60px; height: 4px; background: var(--bg-tertiary); border-radius: 2px; margin-top: 4px; overflow: hidden;">
                            <div style="height: 100%; background: var(--accent-green); border-radius: 2px; width: ${(agent.hp / agent.maxHp) * 100}%"></div>
                        </div>
                    </div>
                `;
                office.appendChild(div);
            });
        }
        
        function renderProjects(projects) {
            const container = document.getElementById('projectsGrid');
            container.innerHTML = projects.map(project => `
                <div class="project-card" onclick="showProjectDetails('${project.id}')">
                    <div class="project-header">
                        <div class="project-icon">${getStatusIcon(project.status)}</div>
                        <div class="project-status-badge ${getStatusClass(project.status)}">${getStatusLabel(project.status)}</div>
                    </div>
                    <div class="project-name">${project.name}</div>
                    <div class="project-desc">${project.desc}</div>
                    
                    <div class="project-progress-section">
                        <div class="project-progress-header">
                            <span class="project-progress-label">Progress</span>
                            <span class="project-progress-value">${project.progress}%</span>
                        </div>
                        <div class="project-progress-bar">
                            <div class="project-progress-fill" style="width: ${project.progress}%; background: ${getProgressColor(project.progress)};"></div>
                        </div>
                    </div>
                    
                    <div class="project-stats">
                        <div class="project-stat">
                            <div class="project-stat-value">${project.team.length}</div>
                            <div class="project-stat-label">Agents</div>
                        </div>
                        <div class="project-stat">
                            <div class="project-stat-value">${Math.floor(project.progress / 10)}</div>
                            <div class="project-stat-label">Tasks</div>
                        </div>
                        <div class="project-stat">
                            <div class="project-stat-value" style="color: ${project.progress >= 80 ? 'var(--accent-green)' : project.progress >= 50 ? 'var(--accent-cyan)' : 'var(--accent-amber)'};">${project.progress >= 80 ? '✓' : project.progress >= 50 ? '~' : '○'}</div>
                            <div class="project-stat-label">Health</div>
                        </div>
                    </div>
                    
                    <div class="project-team-section">
                        <div class="project-team">
                            ${project.team.map(agentId => {
                                const agent = currentData.agents?.find(a => a.id === agentId);
                                return agent ? `
                                    <div class="team-member" title="${agent.name} (${agent.pokemon})">
                                        <img src="${agent.sprite}" alt="${agent.pokemon}">
                                    </div>
                                ` : '';
                            }).join('')}
                        </div>
                        <div class="project-updated">
                            <span>↻</span>
                            <span>Updated now</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Also render mini projects
            renderMiniProjects(projects);
        }
        
        function renderMiniProjects(projects) {
            const container = document.getElementById('miniProjects');
            container.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px;">
                    ${projects.slice(0, 3).map(project => `
                        <div style="padding: 16px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer; transition: all 0.2s;" onmouseover="this.style.borderColor='var(--accent-cyan)'" onmouseout="this.style.borderColor='var(--border-color)'" onclick="switchTab('projects')">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                <span style="font-weight: 600;">${project.name}</span>
                                <span style="font-size: 12px; color: ${project.progress >= 80 ? 'var(--accent-green)' : 'var(--accent-cyan)'}; font-family: 'JetBrains Mono', monospace;">${project.progress}%</span>
                            </div>
                            <div style="height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden;">
                                <div style="height: 100%; width: ${project.progress}%; background: ${getProgressColor(project.progress)}; border-radius: 3px; transition: width 0.5s;"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function showProjectDetails(projectId) {
            const project = currentData.projects?.find(p => p.id == projectId);
            if (project) {
                alert(`Project: ${project.name}\nStatus: ${getStatusLabel(project.status)}\nProgress: ${project.progress}%\nTeam: ${project.team.length} agents\n\n${project.desc}`);
            }
        }
        
        function renderTasks(tasks) {
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = tasks.slice(0, 4).map(task => `
                <div class="task-item">
                    <div class="task-sprite"><img src="${getAgentSprite(task.assignee)}" alt="${task.assigneeName}"></div>
                    <div class="task-info">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">${task.assigneeName} • ${task.due}</div>
                    </div>
                    <div class="task-progress-wrapper">
                        <div class="task-progress-bar-bg">
                            <div class="task-progress-bar" style="width: ${task.progress}%; background: ${getProgressColor(task.progress)}"></div>
                        </div>
                    </div>
                    <div class="task-status ${task.status}">${task.progress}%</div>
                </div>
            `).join('');
            
            document.getElementById('allTasksList').innerHTML = `<div style="display: grid; gap: 12px;">${tasks.map(task => `
                <div class="task-item">
                    <div class="task-sprite"><img src="${getAgentSprite(task.assignee)}" alt="${task.assigneeName}"></div>
                    <div class="task-info">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">${task.icon} ${task.assigneeName} • Due: ${task.due}</div>
                    </div>
                    <div class="task-progress-wrapper">
                        <div class="task-progress-bar-bg">
                            <div class="task-progress-bar" style="width: ${task.progress}%; background: ${getProgressColor(task.progress)}"></div>
                        </div>
                    </div>
                    <div class="task-status ${task.status}">${task.status}</div>
                </div>
            `).join('')}</div>`;
        }
        
        function renderAgentRoster(agents) {
            document.getElementById('agentRoster').innerHTML = agents.map(agent => `
                <div class="agent-card">
                    <div class="agent-sprite-box"><img src="${agent.sprite}" alt="${agent.pokemon}"></div>
                    <div style="flex: 1;">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                            <div>
                                <div class="agent-name">${agent.name}</div>
                                <div class="agent-pokemon">#${agent.number} ${agent.pokemon}</div>
                            </div>
                        </div>
                        <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;">${agent.role} • ${agent.task}</div>
                        <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">HP: ${agent.hp}/${agent.maxHp} • Currently ${agent.status === 'active' ? 'working' : 'busy'}</div>
                        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                            <span class="badge type-${agent.type.toLowerCase()}">${agent.type}</span>
                            <span class="badge" style="background: ${agent.status === 'active' ? 'rgba(0,255,136,0.15)' : 'rgba(255,51,102,0.15)'}; color: ${agent.status === 'active' ? 'var(--accent-green)' : 'var(--accent-red)'}; border: 1px solid ${agent.status === 'active' ? 'rgba(0,255,136,0.3)' : 'rgba(255,51,102,0.3)'};">${agent.status.toUpperCase()}</span>
                            <span class="badge">⚡ ${agent.role}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderConsole(logs) {
            const consoleEl = document.getElementById('consoleOutput');
            consoleEl.innerHTML = logs.slice(-50).map(log => `
                <div class="console-line">
                    <span class="console-time">${new Date(log.time).toLocaleTimeString()}</span>
                    <span class="console-prompt">ZERO></span>
                    <span>${log.message}</span>
                </div>
            `).join('');
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }
        
        function getAgentSprite(agentId) {
            const agent = currentData.agents?.find(a => a.id === agentId);
            return agent?.sprite || '';
        }
        
        socket.on('connect', () => {
            console.log('Connected to Command Center');
            document.getElementById('loading').classList.add('hidden');
        });
        
        socket.on('data', (data) => {
            currentData = data;
            renderOffice(data.agents);
            renderProjects(data.projects);
            renderTasks(data.tasks);
            renderAgentRoster(data.agents);
            renderConsole(data.logs);
        });
    </script>
</body>
</html>
