version: '3.8'

services:
  command-center:
    build: .
    ports:
      - "3456:3456"
    environment:
      - NODE_ENV=production
      - PORT=3456
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - zero-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - command-center
    restart: unless-stopped
    networks:
      - zero-network

networks:
  zero-network:
    driver: bridge
